version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bna-postgres
    restart: always
    environment:
      POSTGRES_DB: bna_defense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: bna-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bna.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
