spring:
  application:
    name: defense-management
  datasource:
    url: jdbc:postgresql://localhost:5432/bna_defense
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8082
logging:
  level:
    com.bna.defense: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
